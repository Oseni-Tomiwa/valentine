<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Valentine 💖</title>

  <style>
    body {
      background: #ffd6e7;
      height: 100vh;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: "Segoe UI", sans-serif;
    }

    .card {
      background: white;
      padding: 40px;
      border-radius: 25px;
      text-align: center;
      width: 360px;
      position: relative;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    button {
      padding: 12px 28px;
      border-radius: 30px;
      border: none;
      font-size: 16px;
      cursor: pointer;
      margin: 10px;
    }

    .yes {
      background: hotpink;
      color: white;
    }

    .no {
      background: #eee;
      position: absolute;
    }

    .hint {
      font-size: 12px;
      margin-top: 60px;
      opacity: 0.7;
    }

    /* Letter */
    .letter {
      background:white;
      max-width:600px;
      width:100%;
      padding:40px;
      border-radius:25px;
      box-shadow:0 10px 30px rgba(0,0,0,0.1);
      line-height:1.7;
    }

    .letter h2 {
      text-align:center;
    }

    .sign {
      text-align:right;
      margin-top:30px;
    }

    /* Mobile */
    @media (max-width: 480px) {
      .letter {
        padding:25px;
        font-size:15px;
      }
    }
  </style>
</head>

<body>

  <!-- Background music -->
  <audio id="bgMusic" src="love.mp3" loop></audio>

  <!-- Valentine card -->
  <div class="card">
    <h2>🐣💖</h2>
    <h3>Olumurewa, will you be my Valentine?</h3>

    <button class="yes" onclick="yesClicked()">Yes</button>
    <button class="no" id="noBtn">No</button>

    <div class="hint" id="hint"></div>
  </div>

  <!-- Confetti canvas -->
  <canvas id="confetti"></canvas>

  <script>
    const name = "Olumurewa";

    const noBtn = document.getElementById("noBtn");
    const hint = document.getElementById("hint");

    // Make "No" dodge
    noBtn.addEventListener("mouseover", () => {
      const x = Math.random() * 220 - 110;
      const y = Math.random() * 120 - 60;
      noBtn.style.transform = `translate(${x}px, ${y}px)`;
      hint.textContent = `"No" seems a bit shy 👀`;
    });

    // Fade in music
    function fadeInMusic(audio) {
      audio.volume = 0;
      audio.play();
      let vol = 0;
      const fade = setInterval(() => {
        if (vol < 0.6) {
          vol += 0.02;
          audio.volume = vol;
        } else {
          clearInterval(fade);
        }
      }, 200);
    }

    // Toggle music
    function toggleMusic() {
      const music = document.getElementById("bgMusic");
      music.paused ? music.play() : music.pause();
    }

    // YES clicked
    function yesClicked() {
      const music = document.getElementById("bgMusic");
      fadeInMusic(music);

      document.body.innerHTML = `
        <audio id="bgMusic" src="love.mp3" loop autoplay></audio>

        <button onclick="toggleMusic()" style="
          position:fixed;
          top:20px;
          right:20px;
          border:none;
          background:white;
          padding:10px 14px;
          border-radius:50%;
          font-size:18px;
          cursor:pointer;
          box-shadow:0 5px 15px rgba(0,0,0,0.15);
        ">⏸</button>

        <div style="
          background:#ffd6e7;
          min-height:100vh;
          display:flex;
          justify-content:center;
          align-items:center;
          padding:20px;
        ">
          <div class="letter">
            <h2>💖 Dear ${name},</h2>

            <p>Hey my love,</p>

            <p>
              I just want you to know how happy you made me by saying yes.
              Choosing you as my Valentine was easy, but having you choose me
              back means everything.
            </p>

            <p>
              You bring so much light, peace, and happiness into my life, and
              I’m grateful for you every single day.
            </p>

            <p>
              I can’t wait to create beautiful memories with you — not just on
              Valentine’s Day, but always. ❤️
            </p>

            <p class="sign">
              💕 Always,<br>
              <strong>Me</strong>
            </p>
          </div>
        </div>

        <canvas id="confetti"></canvas>
      `;

      startConfetti();
    }

    // Confetti
    function startConfetti() {
      const canvas = document.getElementById("confetti");
      const ctx = canvas.getContext("2d");
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      const pieces = Array.from({ length: 120 }).map(() => ({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 6 + 4,
        d: Math.random() * 10 + 5,
        color: `hsl(${Math.random() * 360},100%,70%)`
      }));

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        pieces.forEach(p => {
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = p.color;
          ctx.fill();
          p.y += p.d * 0.3;
          if (p.y > canvas.height) p.y = -10;
        });
        requestAnimationFrame(draw);
      }
      draw();
    }
  </script>

</body>
</html>
